# Set true color
set -g default-terminal 'tmux-256color'
set -ag terminal-overrides ',xterm-256color:RGB'

# Enable mouse support
set -g mouse on

# Bind prefix key to control-space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g renumber-windows on

# Set vi-mode
set-window-option -g mode-keys vi
# key-bindings for vi mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Open panes in current directory
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# Status Bar
set -g status on
set -g status-position top
set -g status-interval 5

set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'

# Keep it visually light / thin by not cramming data
set -g status-left-length 40
set -g status-right-length 80

# Left: session name
set -g status-left ' #[bold]#S#[default] '

# Middle: windows
set -g window-status-style "fg=#a6adc8,bg=#1e1e2e"
set -g window-status-current-style "fg=#f5e0dc,bg=#1e1e2e,bold"

set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

# Right: prefix highlight (if plugin), host, time
set -g status-right '#{prefix_highlight} #[fg=#a6adc8]#H #[fg=#a6adc8]'

# Plugins
setenv -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
setenv -g PATH "$PATH:/opt/homebrew/bin:/usr/local/bin"

set -g @sessionx-bind 'S'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tpm'

setenv -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run ~/.tmux/plugins/tpm/tpm

